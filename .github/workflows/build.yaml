name: Build Aidoku sources

on:
  push:
    branches:
      - main
    paths:
      - "sources/**"
      - ".github/workflows/build.yaml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            sources/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('sources/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Aidoku CLI
        run: |
          if ! command -v aidoku >/dev/null 2>&1; then
            cargo install --git https://github.com/Aidoku/aidoku-rs aidoku-cli
          fi

      - name: Package sources
        run: |
          for src in ./sources/*; do
            (
              cd "$src"
              aidoku package
            )
          done

      - name: Build source list
        run: aidoku build sources/*/package.aix --name "Jacky Aidoku Sources"

      - name: Upload source list artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aidoku-source-list
          path: public
          if-no-files-found: ignore

      - name: Deploy GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.7.2
        with:
          branch: gh-pages
          folder: public
          single-commit: true
          commit-message: Update Aidoku source list
